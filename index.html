<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日市場情報 · Daily Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #f5f3ee;
      --surface:      #fdfcf9;
      --border:       #dedad2;
      --border-light: #e8e5de;
      --ink:          #18160f;
      --ink-body:     #38342a;
      --ink-muted:    #7c7868;
      --ink-faint:    #b0ac9e;
      --rule:         #c8c3b4;
      --accent:       #7a6a48;
      --accent-dark:  #5a4c32;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #111008;
        --surface:      #171510;
        --border:       #2a2820;
        --border-light: #222018;
        --ink:          #ede8dc;
        --ink-body:     #b8b2a0;
        --ink-muted:    #706a58;
        --ink-faint:    #403c30;
        --rule:         #2a2820;
        --accent:       #b09060;
        --accent-dark:  #c8a870;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
      color: var(--ink-body);
      -webkit-font-smoothing: antialiased;
      padding: 60px 28px 80px;
    }

    /* ── DECORATIVE RULE ABOVE ── */
    .top-rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--rule));
      margin: 0 auto 40px;
    }

    /* ── LABEL ── */
    .label {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 580px;
      width: 100%;
      text-align: center;
    }

    /* ── MASTHEAD ── */
    .masthead {
      margin-bottom: 20px;
    }
    .masthead h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      letter-spacing: -.01em;
      margin-bottom: 6px;
    }
    .masthead .en {
      font-family: 'Playfair Display', serif;
      font-size: clamp(.85rem, 2vw, 1rem);
      font-weight: 400;
      font-style: italic;
      color: var(--ink-faint);
      letter-spacing: .06em;
    }

    /* ── DIVIDER ── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      justify-content: center;
    }
    .ornament::before, .ornament::after {
      content: '';
      width: 60px;
      height: 1px;
      background: var(--border);
    }
    .ornament-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--rule);
    }

    /* ── DESCRIPTION ── */
    .description {
      font-size: 14.5px;
      line-height: 1.85;
      color: var(--ink-muted);
      margin-bottom: 36px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }
    .description strong {
      color: var(--ink-body);
      font-weight: 500;
    }

    /* ── STATS ROW ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 40px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
    }
    .stat-label {
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: .06em;
    }
    .stat-sep {
      width: 1px;
      height: 36px;
      background: var(--border);
      align-self: center;
    }

    /* ── EMAIL FORM ── */
    .form-wrap {
      display: flex;
      gap: 0;
      max-width: 420px;
      margin: 0 auto 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122,106,72,.1);
    }
    .form-wrap input[type="email"] {
      flex: 1;
      border: none;
      outline: none;
      padding: 13px 16px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13.5px;
      color: var(--ink);
      background: transparent;
    }
    .form-wrap input::placeholder {
      color: var(--ink-faint);
    }
    .form-wrap button {
      flex-shrink: 0;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 13px 20px;
      background: var(--accent);
      color: #fdfcf9;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: .04em;
      transition: background .15s;
      white-space: nowrap;
    }
    .form-wrap button:hover { background: var(--accent-dark); }

    /* ── SUCCESS STATE ── */
    .success-msg {
      display: none;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: .03em;
      margin-bottom: 16px;
    }

    /* ── PRIVACY NOTE ── */
    .privacy {
      font-size: 11.5px;
      color: var(--ink-faint);
      margin-bottom: 32px;
    }

    /* ── DIVIDER LINE ── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 300px;
      margin: 0 auto 28px;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }
    .or-divider span {
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: .08em;
    }

    /* ── BROWSE BUTTON ── */
    .browse-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--ink-muted);
      font-size: 13px;
      letter-spacing: .04em;
      transition: border-color .15s, color .15s, background .15s;
      background: transparent;
    }
    .browse-btn:hover {
      border-color: var(--rule);
      color: var(--ink-body);
      background: var(--surface);
    }
    .browse-arrow {
      font-size: 13px;
      color: var(--accent);
      transition: transform .15s;
    }
    .browse-btn:hover .browse-arrow { transform: translateX(3px); }

    /* ── BOTTOM RULE ── */
    .bottom-rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--rule), transparent);
      margin: 48px auto 0;
    }

    /* ── LATEST TEASER ── */
    .latest-teaser {
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid var(--border-light);
      max-width: 480px;
      text-align: left;
    }
    .teaser-label {
      font-size: 10.5px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }
    .teaser-headline {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .teaser-summary {
      font-size: 12.5px;
      color: var(--ink-muted);
      line-height: 1.7;
    }
    .teaser-meta {
      margin-top: 10px;
      font-size: 11.5px;
      color: var(--ink-faint);
    }

    @media (max-width: 480px) {
      .stats { gap: 20px; }
      .form-wrap { flex-direction: column; border-radius: 6px; }
      .form-wrap input[type="email"] { border-bottom: 1px solid var(--border); }
      .form-wrap button { text-align: center; border-radius: 0; }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YE6NJ2QJ63"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YE6NJ2QJ63');
  </script>
</head>
<body>

  <div class="top-rule"></div>

  <div class="label">Daily Briefing</div>

  <div class="container">

    <div class="masthead">
      <h1>每日市場情報</h1>
      <div class="en">AI · Web3 · VC · 科技趨勢</div>
    </div>

    <div class="ornament">
      <div class="ornament-dot"></div>
      <div class="ornament-dot"></div>
      <div class="ornament-dot"></div>
    </div>

    <p class="description">
      每個工作日，一份看得完、看得懂、有意義的情報。<br>
      <strong>不是新聞摘要</strong>，而是結構性的觀點，告訴你 <strong style="font-family: serif;">"So-What?"</strong>
    </p>

    <div class="stats">
      <div class="stat">
        <span class="stat-num">8</span>
        <span class="stat-label">期</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-num">90+</span>
        <span class="stat-label">則報導</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-num">每日</span>
        <span class="stat-label">更新</span>
      </div>
    </div>

    <!-- EMAIL FORM -->
    <div class="form-wrap" id="form-wrap">
      <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email" />
      <button onclick="handleSubscribe()">訂閱情報</button>
    </div>
    <p class="success-msg" id="success-msg">✓ 已收到，電子報功能正在製作中，敬請期待。</p>
    <p class="privacy">免費訂閱 · 隨時退訂</p>

    <div class="or-divider"><span>或</span></div>

    <a class="browse-btn" href="briefings.html">
      直接在網站瀏覽
      <span class="browse-arrow">→</span>
    </a>

    <!-- LATEST ISSUE TEASER -->
    <div class="latest-teaser">
      <div class="teaser-label">最新一期 · 2026-03-21</div>
      <div class="teaser-headline">誰在悄悄換籌碼？</div>
      <div class="teaser-summary">三個月內，$12.5 億投資只確定 $3 億、$220 億估值賭一部未過法案、CEO 帶著個人倉位離開基金。大牌玩家正在用看似對外宣示的舉動，實際上執行資本調度。</div>
      <div class="teaser-meta">今日 11 篇</div>
    </div>

  </div>

  <div class="bottom-rule"></div>

  <script>
    async function handleSubscribe() {
      const input = document.getElementById('email-input');
      const btn   = document.querySelector('.form-wrap button');
      const wrap  = document.getElementById('form-wrap');
      const msg   = document.getElementById('success-msg');
      const val   = input.value.trim();

      if (!val || !val.includes('@')) {
        input.style.outline = '2px solid #c0533a';
        setTimeout(() => input.style.outline = '', 1200);
        return;
      }

      btn.disabled    = true;
      btn.textContent = '送出中…';

      try {
        const res = await fetch('https://bitter-lab-5214.nairuichen0720.workers.dev', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: val }),
        });

        if (res.ok) {
          wrap.style.display = 'none';
          msg.style.display  = 'block';
        } else {
          throw new Error(res.status);
        }
      } catch {
        btn.disabled    = false;
        btn.textContent = '訂閱情報';
        input.style.outline = '2px solid #c0533a';
        setTimeout(() => input.style.outline = '', 1200);
      }
    }
  </script>
</body>
</html>
